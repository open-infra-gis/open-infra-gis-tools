name: Professionalize Open Infra GIS Toolkit

on:
  workflow_dispatch:
    inputs:
      note:
        description: "Manual run note"
        required: false
        default: "Professional repo bootstrap"

permissions:
  contents: write

jobs:
  professionalize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write professional repository structure
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          FILES = {
  "README.md": "# Open Infra GIS Tools\n\n**Open Infra GIS Tools** is an early-stage open-source toolkit for practical, production-oriented GIS workflows used in infrastructure-scale geospatial data processing, environmental monitoring, spatial data quality control, and public-service use cases.\n\nThe project focuses on small, reusable, non-sensitive tools that GIS analysts and infrastructure data teams can adapt without starting from scratch.\n\n## Why this project exists\n\nGIS is not only a technical tool. It helps people understand where risks are, how infrastructure may be affected, and where preventive action should be prioritized.\n\nInfrastructure, utility, municipal, and public-data teams often need to combine desktop GIS tools, spatial databases, OGC services, public datasets, and field-oriented workflows. In practice, many of these workflows remain scattered across local scripts, manual QGIS steps, SQL snippets, or undocumented GeoServer configurations.\n\nThis repository aims to turn recurring GIS problems into clean, reusable, openly licensed examples.\n\n## Main focus areas\n\n- Oracle Spatial / SDO_GEOMETRY helper SQL\n- QGIS Python automation scripts\n- GeoServer and OGC service publishing notes\n- WMS/WFS service checks and layer inventory tools\n- Public geospatial data workflows\n- NASA Black Marble / VIIRS night-time lights analysis\n- Spatial quality control and CRS/SRID consistency checks\n- Infrastructure exposure, proximity, and preventive planning workflows\n\n## Tool catalog\n\nThe initial toolkit is organized around 20 practical GIS utilities and workflow documents:\n\n| # | Tool / workflow | Area | Status |\n|---|---|---|---|\n| 1 | Oracle Spatial Geometry Validation SQL | Oracle Spatial | Starter available |\n| 2 | Oracle Spatial Metadata & Spatial Index Checker | Oracle Spatial | Starter available |\n| 3 | Oracle Spatial SRID and Geometry Type Audit | Oracle Spatial | Starter available |\n| 4 | Oracle Spatial Length / Area Summary Reporter | Oracle Spatial | Starter available |\n| 5 | Oracle Spatial Duplicate Geometry Detector | Oracle Spatial | Starter available |\n| 6 | QGIS KML/KMZ Batch Merge Tool | QGIS | Starter available |\n| 7 | QGIS Vector Folder Inventory Reporter | QGIS | Starter available |\n| 8 | QGIS Project CRS Consistency Checker | QGIS | Starter available |\n| 9 | QGIS Geometry Validation and Error Export Tool | QGIS | Starter available |\n| 10 | QGIS Export Layers to Single GeoPackage Tool | QGIS | Starter available |\n| 11 | QGIS Clip Dataset by Boundary Tool | QGIS | Starter available |\n| 12 | QGIS Area and Length Summary Tool | QGIS | Starter available |\n| 13 | QGIS Nearest Asset / Proximity Analysis Tool | QGIS | Starter available |\n| 14 | QGIS Batch Style Apply Tool | QGIS | Starter available |\n| 15 | QGIS Layer Field / Attribute Audit Tool | QGIS | Starter available |\n| 16 | WMS/WFS Service Health Checker | OGC Services | Starter available |\n| 17 | WFS Layer Downloader to GeoJSON | OGC Services | Starter available |\n| 18 | GeoServer Publishing Checklist | GeoServer | Documentation available |\n| 19 | GeoServer GetCapabilities Layer Inventory Tool | OGC Services | Starter available |\n| 20 | NASA Black Marble / VIIRS Night-Time Lights Workflow | Public Data | Documentation available |\n\nSee [`docs/tool-catalog.md`](docs/tool-catalog.md) for details.\n\n## Repository structure\n\n```text\ndocs/\n  geoserver/\n  public-data/\n  roadmap.md\n  tool-catalog.md\nexamples/\n  public-geospatial-data/\nscripts/\n  qgis/\n  ogc/\nsql/\n  oracle-spatial/\n.github/\n  ISSUE_TEMPLATE/\n```\n\n## Data safety\n\nThis project must only contain generic, public, placeholder, or non-sensitive examples.\n\nDo not add:\n\n- Corporate or private datasets\n- Internal database schemas or table names\n- Credentials, tokens, IP addresses, or internal server URLs\n- Operational infrastructure data\n- Personal data\n- Restricted service endpoints\n\nUse placeholders such as `YOUR_TABLE`, `YOUR_GEOMETRY_COLUMN`, `YOUR_WMS_URL`, and `YOUR_OUTPUT_FOLDER`.\n\n## Project status\n\nThis is an early-stage open-source project. The current goal is to establish a useful starter toolkit and documentation structure. The tools are intentionally small and practical so they can be reviewed, improved, and adapted by GIS professionals.\n\n## License\n\nThis project is licensed under the MIT License.\n",
  "docs/roadmap.md": "# Roadmap\n\nOpen Infra GIS Tools is an early-stage open-source GIS toolkit focused on practical, reusable, and non-sensitive workflows for infrastructure-scale geospatial data, environmental monitoring, public datasets, and spatial data quality.\n\n## Guiding principles\n\n- Keep tools small, practical, and easy to adapt\n- Use public, generic, or placeholder-only examples\n- Avoid sensitive operational data\n- Support both GIS analysts and developers\n- Prefer clear documentation over complex abstractions\n- Treat proxy indicators as supporting context, not direct proof\n- Focus on infrastructure resilience, environmental monitoring, and preventive planning\n\n## Phase 1: Professional repository foundation\n\n- README with clear project positioning\n- MIT license\n- Contribution guidelines\n- Data safety guidance\n- Tool catalog\n- Roadmap\n- GitHub issue templates\n- Initial Oracle Spatial, QGIS, OGC, GeoServer, and public-data examples\n\n## Phase 2: Practical starter tools\n\n- Add Oracle Spatial helper SQL examples\n- Add QGIS automation scripts\n- Add OGC service checking utilities\n- Add GeoServer publishing documentation\n- Add NASA Black Marble workflow notes\n- Add public geospatial data examples\n\n## Phase 3: GIS workflow quality\n\n- Add sample outputs where possible\n- Add screenshots or diagrams\n- Add test datasets based only on public or synthetic data\n- Add usage examples for each script\n- Add troubleshooting sections\n\n## Phase 4: Broader ecosystem impact\n\n- Improve documentation for non-developer GIS users\n- Add examples for environmental monitoring and disaster impact context\n- Add infrastructure exposure and proximity analysis workflows\n- Add community contribution examples\n- Expand public-data workflows\n\n## Near-term tasks\n\n- Improve QGIS script documentation\n- Add simple sample input/output descriptions\n- Add GeoServer + Oracle Spatial setup notes\n- Add public WMS/WFS service examples using non-sensitive endpoints\n- Add NASA Black Marble / VIIRS interpretation cautions\n",
  "docs/tool-catalog.md": "# Tool Catalog\n\nThis catalog defines the initial 20-tool package for Open Infra GIS Tools.\n\n## Oracle Spatial / SQL\n\n### 1. Oracle Spatial Geometry Validation SQL\nGeneric validation examples for SDO_GEOMETRY columns.\n\n### 2. Oracle Spatial Metadata & Spatial Index Checker\nChecks geometry metadata and spatial index presence.\n\n### 3. Oracle Spatial SRID and Geometry Type Audit\nAudits SRID and SDO_GTYPE distribution.\n\n### 4. Oracle Spatial Length / Area Summary Reporter\nProduces basic length and area summaries.\n\n### 5. Oracle Spatial Duplicate Geometry Detector\nFinds potential duplicate geometries using geometry WKT/hash patterns.\n\n## QGIS Automation\n\n### 6. QGIS KML/KMZ Batch Merge Tool\nMerges multiple KML/KMZ files into GeoPackage outputs grouped by geometry type.\n\n### 7. QGIS Vector Folder Inventory Reporter\nScans vector files and creates an inventory CSV.\n\n### 8. QGIS Project CRS Consistency Checker\nReports CRS mismatches in the current QGIS project.\n\n### 9. QGIS Geometry Validation and Error Export Tool\nFinds invalid geometries and exports error features.\n\n### 10. QGIS Export Layers to Single GeoPackage Tool\nExports project layers into one GeoPackage.\n\n### 11. QGIS Clip Dataset by Boundary Tool\nClips selected input data by a boundary layer.\n\n### 12. QGIS Area and Length Summary Tool\nCreates area and length summaries for vector layers.\n\n### 13. QGIS Nearest Asset / Proximity Analysis Tool\nCalculates nearest-feature distances for proximity analysis.\n\n### 14. QGIS Batch Style Apply Tool\nApplies QML styles to matching layers.\n\n### 15. QGIS Layer Field / Attribute Audit Tool\nAudits field names, types, and basic attribute completeness.\n\n## OGC Services / GeoServer\n\n### 16. WMS/WFS Service Health Checker\nChecks OGC GetCapabilities response status and response time.\n\n### 17. WFS Layer Downloader to GeoJSON\nDownloads WFS features to GeoJSON using generic service parameters.\n\n### 18. GeoServer Publishing Checklist\nA practical publishing checklist for production-aware GeoServer workflows.\n\n### 19. GeoServer GetCapabilities Layer Inventory Tool\nParses GetCapabilities XML and exports layer names/titles.\n\n## Public Data / Risk & Resilience\n\n### 20. NASA Black Marble / VIIRS Night-Time Lights Workflow\nUses night-time lights as supporting geospatial context for environmental monitoring, disaster impact assessment, and infrastructure resilience.\n\n## Safety note\n\nAll examples must remain generic and non-sensitive. Do not add internal service URLs, private datasets, credentials, operational infrastructure data, or personal data.\n",
  "CONTRIBUTING.md": "# Contributing\n\nThank you for your interest in contributing to Open Infra GIS Tools.\n\nThis project focuses on practical, reusable, and non-sensitive GIS workflows for infrastructure-scale geospatial data, environmental monitoring, public datasets, and spatial data quality.\n\n## Contribution principles\n\n- Use only generic, public, synthetic, or non-sensitive examples.\n- Do not include corporate, private, restricted, or operational datasets.\n- Do not include database credentials, internal URLs, IP addresses, tokens, usernames, passwords, or private table names.\n- Prefer small tools that solve one practical GIS problem clearly.\n- Add comments explaining required user settings.\n- Keep examples understandable for GIS analysts as well as developers.\n\n## Suitable contributions\n\n- Oracle Spatial / SDO_GEOMETRY helper SQL\n- QGIS Python automation scripts\n- GeoServer publishing and troubleshooting notes\n- WMS/WFS workflow examples\n- Public geospatial data processing examples\n- NASA Black Marble / VIIRS workflows\n- Spatial data quality checks\n- Infrastructure resilience and preventive planning workflows\n\n## Placeholder policy\n\nReplace sensitive details with placeholders:\n\n```text\nYOUR_SCHEMA\nYOUR_TABLE\nYOUR_GEOMETRY_COLUMN\nYOUR_WMS_URL\nYOUR_WFS_URL\nYOUR_OUTPUT_FOLDER\n```\n\n## Issue format\n\nWhen opening an issue, include:\n\n- Problem or workflow description\n- Expected output\n- Tool or platform involved\n- Example input type, if relevant\n- Safety or privacy considerations\n",
  "docs/data-safety.md": "# Data Safety Guidelines\n\nOpen Infra GIS Tools must remain safe for open-source use.\n\n## Do not publish\n\n- Corporate datasets\n- Private infrastructure data\n- Personal data\n- Internal server URLs\n- IP addresses\n- Credentials or tokens\n- Database connection strings\n- Internal schema, table, or column names\n- Restricted service endpoints\n- Operational logs\n\n## Use instead\n\n- Public datasets\n- Synthetic examples\n- Placeholder names\n- Generic local file paths\n- Public OGC service examples\n- Documentation that describes the workflow without exposing sensitive sources\n\n## Example placeholders\n\n```text\nYOUR_SCHEMA\nYOUR_TABLE\nYOUR_ID_COLUMN\nYOUR_GEOMETRY_COLUMN\nYOUR_WMS_URL\nYOUR_WFS_URL\nYOUR_INPUT_FOLDER\nYOUR_OUTPUT_FOLDER\n```\n",
  "docs/geoserver/publishing-checklist.md": "# GeoServer Publishing Checklist\n\nThis checklist helps GIS teams publish spatial layers through GeoServer in a more consistent and production-aware way.\n\n## Data readiness\n\n- Geometry column exists and is valid\n- Feature count is known\n- CRS/SRID is known\n- Spatial index exists where applicable\n- Sensitive attributes are removed\n- Layer has been tested in desktop GIS\n\n## Oracle Spatial checks\n\n- Metadata exists in `USER_SDO_GEOM_METADATA`\n- SRID matches expected coordinate system\n- Geometry type is consistent\n- Spatial index exists and is valid\n- Invalid geometries are reviewed before publishing\n\n## Datastore setup\n\n- Use a clear datastore name\n- Use read-only database users where possible\n- Avoid exposing credentials in documentation\n- Separate test and production configurations\n- Test connection before publishing\n\n## Layer publishing\n\n- Confirm layer name, title, and abstract\n- Set native and declared CRS correctly\n- Compute bounding boxes\n- Test WMS preview\n- Test WFS output if enabled\n- Apply readable style\n- Review exposed attributes\n\n## Performance\n\n- Confirm spatial indexes\n- Limit unnecessary attributes\n- Use bounding box filtering\n- Use scale-dependent styles for heavy layers\n- Consider tile caching for WMS\n\n## Security\n\n- Remove sensitive attributes\n- Use layer/workspace permissions\n- Avoid publishing internal URLs in public examples\n- Review WFS access carefully\n",
  "docs/public-data/nasa-black-marble-workflow.md": "# NASA Black Marble / VIIRS Night-Time Lights Workflow\n\nNASA Black Marble and VIIRS night-time lights data can be used as supporting geospatial context for environmental monitoring, disaster impact assessment, urban activity analysis, and infrastructure resilience workflows.\n\nNight-time lights should not be treated as direct proof of outages or service conditions.\n\n## Potential use cases\n\n- Monitoring changes before and after natural events\n- Supporting disaster impact and recovery assessment\n- Understanding urban activity and settlement patterns\n- Comparing light intensity with infrastructure or service areas\n- Identifying areas where major changes may require further review\n- Creating visual context for infrastructure resilience planning\n\n## Generic workflow\n\n1. Select an area of interest.\n2. Access NASA Black Marble / VIIRS night-time lights data.\n3. Load raster data into QGIS.\n4. Reproject or align data if needed.\n5. Clip data by the area of interest.\n6. Compare dates or periods.\n7. Symbolize change values carefully.\n8. Review results with other spatial datasets.\n9. Document limitations and uncertainty.\n\n## Interpretation cautions\n\nNight-time light changes may be affected by cloud cover, atmospheric conditions, sensor differences, seasonal effects, temporary events, snow or surface reflectance, preprocessing methods, or non-electric light sources.\n",
  "examples/public-geospatial-data/README.md": "# Public Geospatial Data Examples\n\nThis folder is intended for examples based on public, generic, synthetic, or non-sensitive geospatial datasets.\n\n## Planned themes\n\n- Public WMS/WFS services\n- Administrative boundary clipping\n- Land-cover analysis\n- Elevation context\n- NASA Black Marble / VIIRS night-time lights\n- Disaster impact context\n- Environmental monitoring\n- Infrastructure exposure analysis\n\n## Safety\n\nDo not add private, restricted, corporate, operational, or personal datasets.\n",
  "sql/oracle-spatial/check_spatial_metadata.sql": "/*\n  Generic Oracle Spatial metadata and spatial index checks.\n  Replace YOUR_TABLE and GEOM_COLUMN with your own placeholders.\n*/\n\nSELECT table_name, column_name, srid, diminfo\nFROM USER_SDO_GEOM_METADATA\nWHERE table_name = UPPER('YOUR_TABLE');\n\nSELECT i.index_name, i.index_type, i.status, c.table_name, c.column_name\nFROM USER_INDEXES i\nJOIN USER_IND_COLUMNS c ON i.index_name = c.index_name\nWHERE c.table_name = UPPER('YOUR_TABLE')\n  AND c.column_name = UPPER('GEOM_COLUMN')\nORDER BY i.index_name;\n",
  "sql/oracle-spatial/srid_geometry_type_audit.sql": "/*\n  Generic SRID and geometry type audit.\n  Replace YOUR_TABLE and GEOM_COLUMN.\n*/\n\nSELECT t.GEOM_COLUMN.SDO_SRID AS srid, COUNT(*) AS feature_count\nFROM YOUR_TABLE t\nWHERE t.GEOM_COLUMN IS NOT NULL\nGROUP BY t.GEOM_COLUMN.SDO_SRID\nORDER BY t.GEOM_COLUMN.SDO_SRID;\n\nSELECT t.GEOM_COLUMN.SDO_GTYPE AS sdo_gtype, COUNT(*) AS feature_count\nFROM YOUR_TABLE t\nWHERE t.GEOM_COLUMN IS NOT NULL\nGROUP BY t.GEOM_COLUMN.SDO_GTYPE\nORDER BY t.GEOM_COLUMN.SDO_GTYPE;\n",
  "sql/oracle-spatial/length_area_summary.sql": "/*\n  Generic length / area summary examples.\n  Replace YOUR_TABLE, GEOM_COLUMN, and tolerance.\n*/\n\nSELECT\n    COUNT(*) AS feature_count,\n    SUM(SDO_GEOM.SDO_LENGTH(t.GEOM_COLUMN, 0.005)) AS total_length\nFROM YOUR_TABLE t\nWHERE t.GEOM_COLUMN IS NOT NULL;\n\nSELECT\n    COUNT(*) AS feature_count,\n    SUM(SDO_GEOM.SDO_AREA(t.GEOM_COLUMN, 0.005)) AS total_area\nFROM YOUR_TABLE t\nWHERE t.GEOM_COLUMN IS NOT NULL;\n",
  "sql/oracle-spatial/duplicate_geometry_detector.sql": "/*\n  Generic duplicate geometry detector pattern.\n  Replace YOUR_TABLE, ID_COLUMN, and GEOM_COLUMN.\n  Test on a copy before using with large production datasets.\n*/\n\nWITH geom_hashes AS (\n    SELECT\n        t.ID_COLUMN,\n        STANDARD_HASH(SDO_UTIL.TO_WKTGEOMETRY(t.GEOM_COLUMN), 'SHA256') AS geom_hash\n    FROM YOUR_TABLE t\n    WHERE t.GEOM_COLUMN IS NOT NULL\n)\nSELECT geom_hash, COUNT(*) AS duplicate_count\nFROM geom_hashes\nGROUP BY geom_hash\nHAVING COUNT(*) > 1\nORDER BY duplicate_count DESC;\n",
  "scripts/qgis/merge_kml_kmz_layers.py": "\"\"\"\nMerge multiple KML/KMZ vector files from a folder into GeoPackage outputs\ngrouped by geometry type. Run inside QGIS Python Console.\n\"\"\"\n\nfrom pathlib import Path\nfrom qgis.core import QgsCoordinateReferenceSystem, QgsProject, QgsVectorLayer, QgsWkbTypes\nimport processing\n\nINPUT_FOLDER = r\"C:\\GIS\\input_kml_kmz\"\nOUTPUT_FOLDER = r\"C:\\GIS\\output\"\nOUTPUT_CRS = \"EPSG:4326\"\nRECURSIVE = True\nADD_OUTPUTS_TO_PROJECT = True\n\ndef collect_files(folder):\n    folder = Path(folder)\n    patterns = [\"*.kml\", \"*.kmz\", \"*.KML\", \"*.KMZ\"]\n    files = []\n    for pattern in patterns:\n        files.extend(folder.rglob(pattern) if RECURSIVE else folder.glob(pattern))\n    return sorted(set(files))\n\ndef group_name(layer):\n    g = QgsWkbTypes.geometryType(layer.wkbType())\n    if g == QgsWkbTypes.PointGeometry:\n        return \"points\"\n    if g == QgsWkbTypes.LineGeometry:\n        return \"lines\"\n    if g == QgsWkbTypes.PolygonGeometry:\n        return \"polygons\"\n    return \"unknown\"\n\ndef main():\n    out_dir = Path(OUTPUT_FOLDER)\n    out_dir.mkdir(parents=True, exist_ok=True)\n    groups = {\"points\": [], \"lines\": [], \"polygons\": [], \"unknown\": []}\n\n    for file_path in collect_files(INPUT_FOLDER):\n        layer = QgsVectorLayer(str(file_path), file_path.stem[:80], \"ogr\")\n        if not layer.isValid() or layer.featureCount() == 0:\n            print(f\"[SKIP] {file_path}\")\n            continue\n        groups[group_name(layer)].append(layer)\n        print(f\"[LOAD] {file_path.name} | {group_name(layer)} | {layer.featureCount()} features\")\n\n    for name, layers in groups.items():\n        if not layers:\n            continue\n        output = str(out_dir / f\"merged_kml_kmz_{name}.gpkg\")\n        result = processing.run(\"native:mergevectorlayers\", {\n            \"LAYERS\": layers,\n            \"CRS\": QgsCoordinateReferenceSystem(OUTPUT_CRS),\n            \"OUTPUT\": output,\n        })\n        if ADD_OUTPUTS_TO_PROJECT:\n            merged = QgsVectorLayer(result[\"OUTPUT\"], f\"merged_kml_kmz_{name}\", \"ogr\")\n            if merged.isValid():\n                QgsProject.instance().addMapLayer(merged)\n        print(f\"[OK] {output}\")\n\nmain()\n",
  "scripts/qgis/vector_folder_inventory.py": "\"\"\"\nScan a folder for vector datasets and create a CSV inventory report.\nRun inside QGIS Python Console.\n\"\"\"\n\nfrom pathlib import Path\nimport csv\nfrom qgis.core import QgsVectorLayer, QgsWkbTypes\n\nINPUT_FOLDER = r\"C:\\GIS\\vector_data\"\nOUTPUT_CSV = r\"C:\\GIS\\vector_inventory.csv\"\nRECURSIVE = True\n\ndef collect_files(folder):\n    folder = Path(folder)\n    extensions = [\"*.shp\", \"*.gpkg\", \"*.geojson\", \"*.kml\", \"*.kmz\", \"*.SHP\", \"*.GPKG\", \"*.GEOJSON\", \"*.KML\", \"*.KMZ\"]\n    files = []\n    for ext in extensions:\n        files.extend(folder.rglob(ext) if RECURSIVE else folder.glob(ext))\n    return sorted(set(files))\n\ndef geom_name(layer):\n    g = QgsWkbTypes.geometryType(layer.wkbType())\n    return {QgsWkbTypes.PointGeometry: \"Point\", QgsWkbTypes.LineGeometry: \"Line\", QgsWkbTypes.PolygonGeometry: \"Polygon\"}.get(g, \"Unknown\")\n\nrows = []\nfor path in collect_files(INPUT_FOLDER):\n    layer = QgsVectorLayer(str(path), path.stem, \"ogr\")\n    rows.append({\n        \"file\": str(path),\n        \"valid\": str(layer.isValid()).lower(),\n        \"geometry_type\": geom_name(layer) if layer.isValid() else \"\",\n        \"feature_count\": layer.featureCount() if layer.isValid() else \"\",\n        \"crs\": layer.crs().authid() if layer.isValid() else \"\",\n    })\n\nPath(OUTPUT_CSV).parent.mkdir(parents=True, exist_ok=True)\nwith open(OUTPUT_CSV, \"w\", newline=\"\", encoding=\"utf-8\") as f:\n    writer = csv.DictWriter(f, fieldnames=[\"file\", \"valid\", \"geometry_type\", \"feature_count\", \"crs\"])\n    writer.writeheader()\n    writer.writerows(rows)\n\nprint(f\"[DONE] {OUTPUT_CSV}\")\n",
  "scripts/qgis/check_project_crs.py": "\"\"\"\nCheck CRS consistency for all vector layers in the current QGIS project.\nRun inside QGIS Python Console.\n\"\"\"\n\nfrom qgis.core import QgsProject, QgsMapLayerType\n\nEXPECTED_CRS_AUTHID = \"EPSG:4326\"\n\nfor layer in QgsProject.instance().mapLayers().values():\n    if layer.type() != QgsMapLayerType.VectorLayer:\n        continue\n    status = \"OK\" if layer.crs().authid() == EXPECTED_CRS_AUTHID else \"MISMATCH\"\n    print(f\"[{status}] {layer.name()} | {layer.crs().authid()} | features={layer.featureCount()}\")\n",
  "scripts/qgis/validate_geometries_export.py": "\"\"\"\nValidate geometries in the active QGIS vector layer and export invalid features.\nRun inside QGIS Python Console.\n\"\"\"\n\nfrom pathlib import Path\nfrom qgis.core import QgsProject\nimport processing\n\nOUTPUT_INVALID = r\"C:\\GIS\\invalid_geometries.gpkg\"\n\nlayer = iface.activeLayer()\nif layer is None:\n    raise RuntimeError(\"No active layer selected.\")\n\nPath(OUTPUT_INVALID).parent.mkdir(parents=True, exist_ok=True)\n\nresult = processing.run(\"qgis:checkvalidity\", {\n    \"INPUT_LAYER\": layer,\n    \"METHOD\": 2,\n    \"VALID_OUTPUT\": \"TEMPORARY_OUTPUT\",\n    \"INVALID_OUTPUT\": OUTPUT_INVALID,\n    \"ERROR_OUTPUT\": \"TEMPORARY_OUTPUT\",\n})\n\ninvalid = result.get(\"INVALID_OUTPUT\")\nif invalid:\n    print(f\"[DONE] Invalid geometries exported to: {OUTPUT_INVALID}\")\nelse:\n    print(\"[DONE] Validation completed.\")\n",
  "scripts/qgis/export_layers_to_gpkg.py": "\"\"\"\nExport all vector layers in the current QGIS project to a single GeoPackage.\nRun inside QGIS Python Console.\n\"\"\"\n\nfrom pathlib import Path\nfrom qgis.core import QgsProject, QgsMapLayerType, QgsVectorFileWriter, QgsCoordinateTransformContext\n\nOUTPUT_GPKG = r\"C:\\GIS\\project_layers_export.gpkg\"\nPath(OUTPUT_GPKG).parent.mkdir(parents=True, exist_ok=True)\n\noptions = QgsVectorFileWriter.SaveVectorOptions()\noptions.driverName = \"GPKG\"\noptions.actionOnExistingFile = QgsVectorFileWriter.CreateOrOverwriteFile\n\nfirst = True\nfor layer in QgsProject.instance().mapLayers().values():\n    if layer.type() != QgsMapLayerType.VectorLayer:\n        continue\n    options.layerName = layer.name().replace(\" \", \"_\")[:60]\n    options.actionOnExistingFile = QgsVectorFileWriter.CreateOrOverwriteFile if first else QgsVectorFileWriter.CreateOrOverwriteLayer\n    error = QgsVectorFileWriter.writeAsVectorFormatV3(layer, OUTPUT_GPKG, QgsCoordinateTransformContext(), options)\n    print(f\"[EXPORT] {layer.name()} -> {OUTPUT_GPKG} | {error}\")\n    first = False\n",
  "scripts/qgis/clip_dataset_by_boundary.py": "\"\"\"\nClip an input vector layer by a boundary layer.\nRun inside QGIS Python Console after setting layer names.\n\"\"\"\n\nimport processing\n\nINPUT_LAYER_NAME = \"YOUR_INPUT_LAYER\"\nBOUNDARY_LAYER_NAME = \"YOUR_BOUNDARY_LAYER\"\nOUTPUT_PATH = r\"C:\\GIS\\clipped_output.gpkg\"\n\nproject = QgsProject.instance()\ninput_layer = project.mapLayersByName(INPUT_LAYER_NAME)[0]\nboundary_layer = project.mapLayersByName(BOUNDARY_LAYER_NAME)[0]\n\nprocessing.run(\"native:clip\", {\n    \"INPUT\": input_layer,\n    \"OVERLAY\": boundary_layer,\n    \"OUTPUT\": OUTPUT_PATH,\n})\n\nprint(f\"[DONE] {OUTPUT_PATH}\")\n",
  "scripts/qgis/area_length_summary.py": "\"\"\"\nPrint basic area/length summary for vector layers in the current QGIS project.\nRun inside QGIS Python Console.\n\"\"\"\n\nfrom qgis.core import QgsProject, QgsWkbTypes, QgsMapLayerType\n\nfor layer in QgsProject.instance().mapLayers().values():\n    if layer.type() != QgsMapLayerType.VectorLayer:\n        continue\n    geom_type = QgsWkbTypes.geometryType(layer.wkbType())\n    total = 0.0\n    for f in layer.getFeatures():\n        g = f.geometry()\n        if not g or g.isEmpty():\n            continue\n        if geom_type == QgsWkbTypes.LineGeometry:\n            total += g.length()\n        elif geom_type == QgsWkbTypes.PolygonGeometry:\n            total += g.area()\n    print(f\"{layer.name()} | features={layer.featureCount()} | total={total}\")\n",
  "scripts/qgis/nearest_feature_proximity.py": "\"\"\"\nRun nearest-neighbor proximity analysis between two QGIS layers.\nRun inside QGIS Python Console after setting layer names.\n\"\"\"\n\nimport processing\n\nINPUT_LAYER_NAME = \"YOUR_INPUT_LAYER\"\nREFERENCE_LAYER_NAME = \"YOUR_REFERENCE_LAYER\"\nOUTPUT_PATH = r\"C:\\GIS\\nearest_proximity.gpkg\"\n\nproject = QgsProject.instance()\ninput_layer = project.mapLayersByName(INPUT_LAYER_NAME)[0]\nreference_layer = project.mapLayersByName(REFERENCE_LAYER_NAME)[0]\n\nprocessing.run(\"native:joinbynearest\", {\n    \"INPUT\": input_layer,\n    \"INPUT_2\": reference_layer,\n    \"FIELDS_TO_COPY\": [],\n    \"DISCARD_NONMATCHING\": False,\n    \"NEIGHBORS\": 1,\n    \"MAX_DISTANCE\": None,\n    \"PREFIX\": \"near_\",\n    \"OUTPUT\": OUTPUT_PATH,\n})\n\nprint(f\"[DONE] {OUTPUT_PATH}\")\n",
  "scripts/qgis/batch_apply_qml_style.py": "\"\"\"\nApply a QML style file to QGIS project layers whose names contain a keyword.\nRun inside QGIS Python Console.\n\"\"\"\n\nfrom qgis.core import QgsProject\n\nLAYER_NAME_CONTAINS = \"YOUR_KEYWORD\"\nQML_STYLE_PATH = r\"C:\\GIS\\styles\\your_style.qml\"\n\nfor layer in QgsProject.instance().mapLayers().values():\n    if LAYER_NAME_CONTAINS.lower() in layer.name().lower():\n        layer.loadNamedStyle(QML_STYLE_PATH)\n        layer.triggerRepaint()\n        print(f\"[STYLE] Applied to {layer.name()}\")\n",
  "scripts/qgis/attribute_audit.py": "\"\"\"\nAudit field names and null counts for the active QGIS vector layer.\nRun inside QGIS Python Console.\n\"\"\"\n\nlayer = iface.activeLayer()\nif layer is None:\n    raise RuntimeError(\"No active layer selected.\")\n\nprint(f\"Layer: {layer.name()}\")\nprint(f\"Features: {layer.featureCount()}\")\n\nfor field in layer.fields():\n    null_count = 0\n    for feature in layer.getFeatures():\n        value = feature[field.name()]\n        if value is None or value == \"\":\n            null_count += 1\n    print(f\"{field.name()} | {field.typeName()} | null_or_empty={null_count}\")\n",
  "scripts/ogc/check_ogc_service_status.py": "\"\"\"\nCheck basic WMS/WFS GetCapabilities availability for generic OGC service URLs.\n\nUsage:\npython check_ogc_service_status.py\n\"\"\"\n\nfrom urllib.parse import urlencode\nfrom urllib.request import urlopen\nfrom time import perf_counter\n\nSERVICES = [\n    {\n        \"name\": \"Example WMS\",\n        \"base_url\": \"https://example.com/geoserver/wms\",\n        \"service\": \"WMS\",\n    },\n    {\n        \"name\": \"Example WFS\",\n        \"base_url\": \"https://example.com/geoserver/wfs\",\n        \"service\": \"WFS\",\n    },\n]\n\nTIMEOUT_SECONDS = 20\n\ndef capabilities_url(base_url, service):\n    query = urlencode({\"service\": service, \"request\": \"GetCapabilities\"})\n    separator = \"&\" if \"?\" in base_url else \"?\"\n    return f\"{base_url}{separator}{query}\"\n\nfor item in SERVICES:\n    url = capabilities_url(item[\"base_url\"], item[\"service\"])\n    start = perf_counter()\n    try:\n        with urlopen(url, timeout=TIMEOUT_SECONDS) as response:\n            body = response.read(500).decode(\"utf-8\", errors=\"ignore\")\n            elapsed = perf_counter() - start\n            ok = \"Capabilities\" in body or \"WMS\" in body or \"WFS\" in body\n            print(f\"[{'OK' if ok else 'CHECK'}] {item['name']} | {response.status} | {elapsed:.2f}s | {url}\")\n    except Exception as exc:\n        elapsed = perf_counter() - start\n        print(f\"[ERROR] {item['name']} | {elapsed:.2f}s | {exc}\")\n",
  "scripts/ogc/wfs_downloader_to_geojson.py": "\"\"\"\nDownload WFS features to GeoJSON using generic parameters.\n\nUsage:\npython wfs_downloader_to_geojson.py\n\"\"\"\n\nfrom urllib.parse import urlencode\nfrom urllib.request import urlopen\nfrom pathlib import Path\n\nWFS_URL = \"https://example.com/geoserver/wfs\"\nTYPENAME = \"workspace:layer_name\"\nOUTPUT_GEOJSON = \"wfs_output.geojson\"\n\nparams = {\n    \"service\": \"WFS\",\n    \"version\": \"2.0.0\",\n    \"request\": \"GetFeature\",\n    \"typeNames\": TYPENAME,\n    \"outputFormat\": \"application/json\",\n}\n\nurl = WFS_URL + (\"&\" if \"?\" in WFS_URL else \"?\") + urlencode(params)\n\nwith urlopen(url, timeout=60) as response:\n    data = response.read()\n\nPath(OUTPUT_GEOJSON).write_bytes(data)\nprint(f\"[DONE] {OUTPUT_GEOJSON}\")\n",
  "scripts/ogc/geoserver_getcapabilities_inventory.py": "\"\"\"\nCreate a simple layer inventory from a WMS GetCapabilities XML document.\n\nUsage:\npython geoserver_getcapabilities_inventory.py\n\"\"\"\n\nfrom urllib.parse import urlencode\nfrom urllib.request import urlopen\nimport xml.etree.ElementTree as ET\nimport csv\n\nWMS_URL = \"https://example.com/geoserver/wms\"\nOUTPUT_CSV = \"wms_layer_inventory.csv\"\n\nurl = WMS_URL + (\"&\" if \"?\" in WMS_URL else \"?\") + urlencode({\n    \"service\": \"WMS\",\n    \"request\": \"GetCapabilities\",\n})\n\nxml_data = urlopen(url, timeout=60).read()\nroot = ET.fromstring(xml_data)\n\nrows = []\nfor layer in root.findall(\".//{*}Layer\"):\n    name = layer.find(\"{*}Name\")\n    title = layer.find(\"{*}Title\")\n    if name is not None and name.text:\n        rows.append({\n            \"name\": name.text,\n            \"title\": title.text if title is not None else \"\",\n        })\n\nwith open(OUTPUT_CSV, \"w\", newline=\"\", encoding=\"utf-8\") as f:\n    writer = csv.DictWriter(f, fieldnames=[\"name\", \"title\"])\n    writer.writeheader()\n    writer.writerows(rows)\n\nprint(f\"[DONE] {OUTPUT_CSV} | layers={len(rows)}\")\n",
  ".github/ISSUE_TEMPLATE/tool_request.md": "---\nname: Tool or workflow request\nabout: Suggest a practical GIS utility, SQL helper, or workflow document\ntitle: \"[Tool] \"\nlabels: enhancement\nassignees: \"\"\n---\n\n## Problem or workflow\n\nDescribe the GIS problem or workflow.\n\n## Tool area\n\n- [ ] Oracle Spatial\n- [ ] QGIS\n- [ ] GeoServer\n- [ ] WMS/WFS / OGC services\n- [ ] Public geospatial data\n- [ ] Environmental monitoring\n- [ ] Infrastructure resilience\n- [ ] Other\n\n## Expected output\n\nDescribe the expected output.\n\n## Safety considerations\n\nConfirm that no private, corporate, restricted, personal, or operational data is included.\n",
  ".github/ISSUE_TEMPLATE/bug_report.md": "---\nname: Bug report\nabout: Report a problem in a script, SQL helper, or document\ntitle: \"[Bug] \"\nlabels: bug\nassignees: \"\"\n---\n\n## Description\n\nDescribe the problem.\n\n## File or tool\n\nMention the file path or tool name.\n\n## Expected behavior\n\nWhat should happen?\n\n## Actual behavior\n\nWhat happened instead?\n\n## Environment\n\n- Tool:\n- Version:\n- Operating system:\n\n## Data safety\n\nDo not include private datasets, credentials, internal URLs, or sensitive operational details.\n",
  "CHANGELOG.md": "# Changelog\n\n## Unreleased\n\n- Professional repository structure\n- Tool catalog with 20 practical GIS utilities/workflows\n- Initial Oracle Spatial helper SQL files\n- Initial QGIS automation scripts\n- Initial OGC service utility scripts\n- GeoServer publishing checklist\n- NASA Black Marble workflow documentation\n- Contribution and data safety guidelines\n"
}

