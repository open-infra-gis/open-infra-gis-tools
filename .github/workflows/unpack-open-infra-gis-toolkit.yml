name: Unpack Open Infra GIS Toolkit Package

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unpack package
        run: |
          unzip -o open-infra-gis-professional-package.zip -d .
          rm open-infra-gis-professional-package.zip

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Professionalize GIS toolkit repository structure"
          git push
